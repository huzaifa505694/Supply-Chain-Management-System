<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChainFlow SCM – Sign In</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', sans-serif; background: #060b18; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; background-image: radial-gradient(ellipse 70% 50% at 10% 20%, rgba(59,130,246,0.12), transparent), radial-gradient(ellipse 60% 40% at 90% 80%, rgba(139,92,246,0.10), transparent); overflow-x: hidden; }
.wrapper { position: relative; z-index: 1; width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; border-radius: 20px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.07); }
.brand { background: linear-gradient(145deg, #0c1a3a 0%, #0a1228 60%, #10163a 100%); padding: 36px 32px; display: flex; flex-direction: column; gap: 28px; position: relative; }
.brand-logo { display:flex; align-items:center; gap:12px; }
.brand-logo-icon { width:44px; height:44px; background:linear-gradient(135deg, #3b82f6, #6366f1); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.25rem; color:#fff; box-shadow: 0 6px 18px rgba(59,130,246,0.4); }
.brand-tagline h2 { font-size:1.45rem; font-weight:800; color:#fff; letter-spacing:-0.04em; margin-bottom:10px; }
.hl { background:linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.brand-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:12px 14px; }
.stat-box .n { font-size:1.3rem; font-weight:700; color:#fff; }
.form-panel { background: rgba(8,13,25,0.98); padding: 36px 32px; display: flex; flex-direction: column; justify-content: center; }
.role-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:20px; }
.rc { padding:12px; border:2px solid rgba(255,255,255,0.07); border-radius:12px; background:rgba(255,255,255,0.02); cursor:pointer; transition:all 0.18s; color:white; }
.rc.sel { border-color:#3b82f6; background:rgba(59,130,246,0.09); }
.inp { width:100%; padding:10px 13px 10px 37px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:9px; color:#f1f5f9; margin-bottom:12px; }
.sub-btn { width:100%; padding:11px; border-radius:9px; background:linear-gradient(135deg,#3b82f6 0%,#6366f1 100%); color:#fff; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
.err-box { display:none; align-items:center; gap:8px; background:rgba(239,68,68,0.09); border:1px solid rgba(239,68,68,0.2); color:#f87171; border-radius:8px; padding:9px 12px; margin-bottom:12px; }
@media (max-width: 720px) { .wrapper { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-logo"><div class="brand-logo-icon"><i class="fa-solid fa-boxes-stacked"></i></div><div style="color:white;font-weight:800;">ChainFlow SCM</div></div>
    <div class="brand-tagline"><h2>Streamline Every <span class="hl">Link</span></h2><p style="color:rgba(255,255,255,0.5);">Unified command center for SCM.</p></div>
    <div class="brand-stats"><div class="stat-box"><div class="n">1,284</div><div style="font-size:0.6rem;color:rgba(255,255,255,0.4);">Orders</div></div><div class="stat-box"><div class="n">38</div><div style="font-size:0.6rem;color:rgba(255,255,255,0.4);">Shipments</div></div></div>
  </div>
  <div class="form-panel">
    <div style="color:white;margin-bottom:20px;"><h2>Welcome back 👋</h2></div>
    <div class="role-grid">
      <button class="rc sel" id="rc-admin" onclick="pickRole('admin')">Admin</button>
      <button class="rc" id="rc-user" onclick="pickRole('user')">Operator</button>
    </div>
    <div class="err-box" id="err">Invalid credentials.</div>
    <input class="inp" type="text" id="uname" placeholder="Username">
    <input class="inp" type="password" id="pwd" placeholder="Password">
    <button class="sub-btn" onclick="doLogin()">Sign In</button>
    <div style="font-size:0.7rem;color:rgba(255,255,255,0.3);text-align:center;">admin / admin123  |  operator / user123</div>
  </div>
</div>

<script>
const AUTH_KEY = 'chainflow_auth';
const API = 'https://full-boxes-stop.loca.lt/api';
let currentRole = 'admin';

function pickRole(r) {
  currentRole = r;
  document.getElementById('rc-admin').classList.toggle('sel', r === 'admin');
  document.getElementById('rc-user').classList.toggle('sel', r === 'user');
}

async function doLogin() {
  const u = document.getElementById('uname').value;
  const p = document.getElementById('pwd').value;
  if (!u || !p) return;
  
  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({ username: u, role: data.role }));
      location.href = 'index.html';
    } else {
      document.getElementById('err').style.display = 'flex';
    }
  } catch (err) { alert('Backend not reachable'); }
}
</script>
</body>
</html>

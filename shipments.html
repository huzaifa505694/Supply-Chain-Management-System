<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipments – ChainFlow SCM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── INLINED DESIGN SYSTEM & COMPONENTS ── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root { --bg-primary: #060b18; --bg-secondary: #0d1526; --bg-card: rgba(15, 23, 42, 0.85); --bg-hover: rgba(30, 41, 59, 0.6); --bg-input: rgba(8, 14, 28, 0.9); --accent-blue: #3b82f6; --accent-indigo: #6366f1; --accent-purple: #8b5cf6; --accent-cyan: #06b6d4; --accent-green: #10b981; --accent-amber: #f59e0b; --accent-red: #ef4444; --glow-blue: rgba(59, 130, 246, 0.35); --glow-purple: rgba(139, 92, 246, 0.35); --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #475569; --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 0.95rem; --border: rgba(255, 255, 255, 0.07); --border-light: rgba(255, 255, 255, 0.12); --border-accent: rgba(59, 130, 246, 0.3); --radius-xs: 4px; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px; --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); --sidebar-width: 250px; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); background-image: radial-gradient(ellipse at 0% 0%, rgba(59,130,246,0.07) 0%, transparent 50%), radial-gradient(ellipse at 100% 100%, rgba(139,92,246,0.07) 0%, transparent 50%); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: var(--text-base); line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 200; border-right: 1px solid var(--border); background: var(--bg-card); backdrop-filter: blur(20px); }
.sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border); }
.sidebar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; color: #fff; }
.logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px var(--glow-blue); }
.sidebar-user { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; }
.sidebar-nav { flex: 1; padding: 12px; overflow-y: auto; }
.nav-links { list-style: none; }
.nav-item a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); transition: var(--transition); }
.nav-item.active a { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.15)); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.18); }
.main-content { flex: 1; margin-left: var(--sidebar-width); }
.topbar { position: sticky; top: 0; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(6, 11, 24, 0.85); backdrop-filter: blur(20px); z-index: 100; }
.page-content { padding: 28px 32px; }
.glass-card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: var(--transition); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 12px; font-size: var(--text-sm); border-bottom: 1px solid var(--border); }
.badge { padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
.badge.primary { background: rgba(59,130,246,0.12); color: #60a5fa; }
.badge.success { background: rgba(16,185,129,0.12); color: #34d399; }
.badge.warning { background: rgba(245,158,11,0.12); color: #fbbf24; }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: var(--text-sm); font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-indigo)); color: #fff; }
</style>
</head>
<body>
<div class="app-container">
  <nav class="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo"><div class="logo-icon"><i class="fa-solid fa-boxes-stacked"></i></div>ChainFlow</div></div>
    <div class="sidebar-user"><div class="user-avatar" id="ua">--</div><div class="un">Loading...</div></div>
    <div class="sidebar-nav">
      <ul class="nav-links">
        <li class="nav-item"><a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
        <li class="nav-item"><a href="products.html"><i class="fa-solid fa-box-open"></i> Products</a></li>
        <li class="nav-item"><a href="orders.html"><i class="fa-solid fa-file-invoice-dollar"></i> Orders</a></li>
        <li class="nav-item active"><a href="shipments.html"><i class="fa-solid fa-truck-fast"></i> Shipments</a></li>
        <li class="nav-item"><a href="partners.html"><i class="fa-solid fa-handshake"></i> Partners</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="topbar"><div>Live Shipments</div><button class="btn btn-primary" onclick="location.reload()">Refresh Data</button></div>
    <div class="page-content">
      <div class="glass-card">
        <table>
          <thead><tr><th>Tracking #</th><th>Origin</th><th>Destination</th><th>Status</th><th>ETA</th></tr></thead>
          <tbody id="ship-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const AUTH_KEY = 'chainflow_auth';
const API = 'https://full-boxes-stop.loca.lt/api';
function getSession() { return JSON.parse(localStorage.getItem(AUTH_KEY)); }
const s = getSession(); if(!s) location.href='login.html';
document.getElementById('ua').textContent = s.username.slice(0,2).toUpperCase();
document.querySelector('.un').textContent = s.username;

async function load() {
  const res = await fetch(`${API}/shipments`);
  const data = await res.json();
  const b = document.getElementById('ship-body');
  data.forEach(s => {
    b.innerHTML += `<tr><td><span style="font-family:monospace;color:var(--accent-blue);">TRK-${s.id}</span></td><td>${s.origin || 'Warehouse-01'}</td><td>${s.destination || 'Retail-X'}</td><td><span class="badge success">${s.status}</span></td><td>${s.shipment_date || 'In Transit'}</td></tr>`;
  });
}
load();
</script>
</body>
</html>
